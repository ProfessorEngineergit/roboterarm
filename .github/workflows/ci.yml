name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Abhängigkeiten (nur numpy — Sim-Tests brauchen keine Hardware)
        run: python -m pip install numpy
      - name: Tests (Simulation)
        run: ROBOTERARM_BACKEND=sim PYTHONPATH=. python -m unittest discover -s tests -v
      - name: Syntaxcheck Scratch-Extension
        run: node --check scratch/roboterarm_extension.js
